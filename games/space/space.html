<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Space Invaders Game</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Russo+One&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="space.css" />
    <link rel="stylesheet" href="/css/header.css" />
    <link rel="stylesheet" href="/css/common.css">

    <link rel="icon" href="https://img.icons8.com/ios-filled/50/40C057/space-fighter.png">
    <script src="space.js" defer></script>
  </head>
  <body class="russo-one-regular">
    <div id="header" class="russo-one-regular"></div>
    <h1 class="russo-one-regular">Space Invaders Game</h1>

  <div class="game-area">
    <canvas id="board"></canvas>
    <div class="touch-controls">
      <button class="touch-btn" data-action="left">◀</button>
      <button class="touch-btn" data-action="right">▶</button>
      <button class="touch-btn" data-action="shoot">●</button>
    </div>
    <button id="restartBtn" class="restart-btn" style="display: none;">Restart Game</button>
  </div>

    <script src="/scripts/header.js"></script>
  </body>
</html>
